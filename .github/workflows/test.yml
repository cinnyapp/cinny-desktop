name: "Build pull request"
on:
  pull_request:
    types: ['opened', 'synchronize']

jobs:
  publish-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with: 
        submodules: true
    - name: Setup node
      uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6.2.0
      with:
        node-version-file: ".node-version"
        package-manager-cache: false
    - name: install Rust stable
      uses: dtolnay/rust-toolchain@stable # They use branch based releases
      with:
        targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
    - name: Install dependencies (ubuntu only)
      if: matrix.platform == 'ubuntu-22.04'
      run: |
        sudo apt-get update
        sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
    - name: Install cinny dependencies
      run: cd cinny && npm ci
    - name: Install tauri dependencies
      run: npm ci
    - name: Build desktop app with Tauri
      uses: tauri-apps/tauri-action@73fb865345c54760d875b94642314f8c0c894afa # v0.6.1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NODE_OPTIONS: "--max_old_space_size=4096"
      with:
          args: ${{ matrix.args }} --config '{"bundle":{"createUpdaterArtifacts":false}}'
    - name: Find existing artifacts
      shell: bash
      id: collect
      run: |
        files=()
        for p in \
          "src-tauri/target/universal-apple-darwin/release/bundle/macos/Cinny.app" \
          "src-tauri/target/release/bundle/deb/Cinny_4.11.2_amd64.deb" \
          "src-tauri/target/release/bundle/rpm/Cinny-4.11.2-1.x86_64.rpm" \
          "src-tauri/target/release/bundle/appimage/Cinny_4.11.2_amd64.AppImage" \
          "src-tauri/target/release/bundle/msi/Cinny_4.11.2_x64_en-US.msi" \
          "src-tauri/target/release/bundle/nsis/Cinny_4.11.2_x64-setup.exe"; do
          if [ -e "$p" ]; then files+=("$p"); fi
        done
        if [ ${#files[@]} -eq 0 ]; then
          echo "No artifacts found, skipping upload." > /tmp/no-artifacts
          echo "::set-output name=paths::"
        else
          printf "%s\n" "${files[@]}" > artifact-paths.txt
          echo "::set-output name=paths::artifact-paths.txt"
        fi

    - name: Upload build artifacts
      if: steps.collect.outputs.paths != ''
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: release-artifacts-${{ matrix.platform }}
        path: ${{ steps.collect.outputs.paths }}
        retention-days: 7
